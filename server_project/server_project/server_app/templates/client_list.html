<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client List</title>
</head>
<body>
    <h1>Registered Clients</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Username</th>
                <th>IP Address</th>
                <th>Port</th>
                <th>Registered At</th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
            <tr>
                <td>{{ client.username }}</td>
                <td>{{ client.ip_address }}</td>
                <td>{{ client.port }}</td>
                <td>{{ client.registered_at }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No clients registered.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
